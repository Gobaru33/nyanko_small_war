<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="robots" content="noindex,nofollow">
    <title>にゃんこ小戦争</title>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        /* スマホで勝手にスクロールされないように固定 */
        html, body { 
            position: fixed; width: 100%; height: 100%; 
            margin: 0; padding: 0; overflow: hidden; 
            background: #eef; font-family: 'Arial Black', sans-serif;
        }

        /* ゲーム画面：スマホの高さに合わせて可変 */
        #game-container {
            position: relative; width: 95%; max-width: 900px; height: 50vh; /* 画面の高さの50%に設定 */
            margin: 10px auto; border: 3px solid #555;
            background: linear-gradient(to bottom, #87CEEB 70%, #90EE90 70%);
            overflow: hidden; display: none;
        }
        .stage-2-active { background: linear-gradient(to bottom, #ff7e5f 70%, #feb47b 70%) !important; }

        /* オーバーレイ */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .logo-container { margin-bottom: 20px; line-height: 1.1; }
        .logo-main {
            font-size: 30px; color: #fff;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000;
            display: block;
        }
        .logo-sub {
            font-size: 60px;
            background: linear-gradient(to bottom, #ffeb3b 50%, #fbc02d 50%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(3px 3px 0 #000); display: block;
        }

        /* ボタンサイズ */
        .menu-btn {
            width: 180px; padding: 12px 0; font-size: 18px; font-weight: bold; cursor: pointer;
            background: #fff; border: 3px solid #333; border-radius: 10px; margin: 5px;
            box-shadow: 0 4px #666; font-family: sans-serif;
        }
        .menu-btn:active { transform: translateY(2px); box-shadow: 0 1px #333; }
        .red-btn { border-color: #f44336; color: #f44336; }

        /* 城とHP */
        .castle { position: absolute; width: 15%; height: 40%; z-index: 10; background-size: contain; background-repeat: no-repeat; background-position: bottom center; }
        #enemy-castle { left: 0; bottom: -5px; background-image: url('enemy_castle.png'); }
        #player-castle { right: 0; bottom: 5px; background-image: url('my_castle.png'); }
        .castle-hp-text {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            width: 80px; color: #333; font-weight: bold; font-size: 12px; font-family: sans-serif;
            background: rgba(255,255,255,0.7); border-radius: 5px; border: 1px solid #555;
        }

        .unit { position: absolute; bottom: 5px; background-size: contain; background-repeat: no-repeat; background-position: bottom center; z-index: 5; }

        /* UIパネル：高さが足りない時も考慮 */
        #ui-panel { background: #ddd; padding: 8px; width: 95%; max-width: 900px; margin: 0 auto; border-radius: 10px; display: none; font-family: sans-serif; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 5px; align-items: center; }
        .money-box { background: #000; color: #0f0; padding: 5px 12px; border-radius: 20px; font-size: 16px; font-weight: bold; border: 2px solid gold; }
        .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
        .spawn-btn { background: #fff; border: 2px solid #ff9800; font-size: 16px; font-weight: bold; padding: 10px; border-radius: 8px; }
        .lv-btn { background: #ffeb3b; grid-column: 1 / -1; border: 2px solid #fbc02d; padding: 8px; font-weight: bold; font-size: 14px; }
        button:disabled { background: #ccc !important; opacity: 0.6; }
        
        #stage-display { font-size: 16px; font-weight: bold; margin: 5px; display: none; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay">
        <div class="logo-container">
            <span class="logo-main">にゃんこ</span>
            <span class="logo-sub">小戦争</span>
        </div>
        <button class="menu-btn" onclick="startGame()">戦闘開始</button>
    </div>

    <div id="lose-menu" class="overlay" style="display: none;">
        <h1 style="color: #f44336; font-size: 40px; text-shadow: 2px 2px 0 #000;">敗北...</h1>
        <button class="menu-btn" onclick="retryStage()">再挑戦</button>
        <button class="menu-btn red-btn" onclick="backToTitle()">撤退する</button>
    </div>

    <div id="stage-display">STAGE 1</div>
    
    <div id="game-container">
        <div id="enemy-castle" class="castle"><div class="castle-hp-text">敵城:<span id="e-hp-txt">1000</span></div></div>
        <div id="player-castle" class="castle"><div class="castle-hp-text">自城:<span id="p-hp-txt">1000</span></div></div>
    </div>

    <div id="ui-panel">
        <div class="status-bar">
            <div class="money-box">💰 <span id="money-txt">0</span> / <span id="max-money-txt">500</span></div>
            <div style="font-size: 14px; font-weight: bold;">Lv.<span id="worker-lv-txt">1</span></div>
        </div>
        <div class="button-grid">
            <button class="lv-btn" id="lv-up-btn" onclick="upgradeWorker()">働きネコ強化 (<span id="lv-cost-txt">100</span>)</button>
            <button class="spawn-btn" id="btn-n1" onclick="spawn(0)">ネコ 20</button>
            <button class="spawn-btn" id="btn-n2" onclick="spawn(1)">タンク 50</button>
        </div>
    </div>

    <script>
        const loadAudio = (src) => { const a = new Audio(src); return a; };
        const bgm = loadAudio('bgm.m4a'); if(bgm) bgm.loop = true;
        const attackSe = loadAudio('attack.mp3');
        const winSe = loadAudio('victory.mp3');
        const loseSe = loadAudio('defeat.mp3');

        function safePlay(audioObj) { if (audioObj) audioObj.play().catch(e => {}); }

        let currentStage = 1, difficultyMult = 1.0, money = 0, workerLv = 1, maxMoney = 500;
        let workerUpgradeCost = 100, playerUnits = [], enemyUnits = [], pCastleHP = 1000, eCastleHP = 1000;
        let isGameOver = true, lastAttackTime = 0, isFirstEnemy = true, spawnInterval;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('ui-panel').style.display = 'block';
            document.getElementById('stage-display').style.display = 'block';
            resetStageData(1);
            isGameOver = false;
            safePlay(bgm);
            enemySpawnLoop();
        }

        function retryStage() {
            document.getElementById('lose-menu').style.display = 'none';
            resetStageData(currentStage);
            isGameOver = false;
            safePlay(bgm);
            enemySpawnLoop();
        }

        function backToTitle() { location.reload(); }

        function resetStageData(stage) {
            currentStage = stage;
            difficultyMult = (stage === 1) ? 1.0 : 1.5;
            pCastleHP = 1000; eCastleHP = (stage === 1) ? 1000 : 2000;
            money = 0; workerLv = 1; maxMoney = 500; workerUpgradeCost = 100;
            isFirstEnemy = true;
            playerUnits.forEach(u => u.el.remove()); enemyUnits.forEach(u => u.el.remove());
            playerUnits = []; enemyUnits = [];
            document.getElementById('stage-display').innerText = "STAGE " + stage;
            if(stage === 2) document.getElementById('game-container').classList.add('stage-2-active');
            else document.getElementById('game-container').classList.remove('stage-2-active');
            clearTimeout(spawnInterval);
        }

        setInterval(() => {
            if (isGameOver) return;
            if (money < maxMoney) money += (0.15 + (workerLv * 0.15));
            document.getElementById('money-txt').innerText = Math.floor(money);
            document.getElementById('max-money-txt').innerText = maxMoney;
            document.getElementById('worker-lv-txt').innerText = workerLv;
            document.getElementById('lv-cost-txt').innerText = workerUpgradeCost;
            document.getElementById('e-hp-txt').innerText = Math.max(0, Math.floor(eCastleHP));
            document.getElementById('p-hp-txt').innerText = Math.max(0, Math.floor(pCastleHP));
            document.getElementById('btn-n1').disabled = (money < 20);
            document.getElementById('btn-n2').disabled = (money < 50);
            document.getElementById('lv-up-btn').disabled = (money < workerUpgradeCost);
        }, 100);

        function upgradeWorker() {
            if (money >= workerUpgradeCost) {
                money -= workerUpgradeCost; workerLv++; maxMoney += 500;
                workerUpgradeCost = Math.floor(workerUpgradeCost * 1.6);
            }
        }

        function spawn(id) {
            if (isGameOver) return;
            const imgs = ['neko.png', 'tank.png'];
            const hps = [150, 1500], atks = [23, 5];
            if (money >= (id === 0 ? 20 : 50)) {
                money -= (id === 0 ? 20 : 50);
                const el = document.createElement('div');
                el.className = 'unit'; el.style.backgroundImage = `url('${imgs[id]}')`;
                document.getElementById('game-container').appendChild(el);
                let range = (id === 1) ? 5 : 50; 
                let size = (id === 1) ? 60 : 40; // スマホ用にユニットサイズも少し縮小
                let offset = (id === 1) ? 20 : 0; 
                el.style.width = size + 'px'; el.style.height = size + 'px';
                let startX = document.getElementById('game-container').clientWidth - 60;
                el.style.left = startX + 'px';
                playerUnits.push({ el: el, x: startX, hp: hps[id], atk: atks[id], range: range, speed: (id===0?3:1.5), size: size, offset: offset });
            }
        }

        function enemySpawnLoop() {
            if (isGameOver) return;
            const imgs = ['dog.png', 'seal.png'];
            let id = isFirstEnemy ? 0 : Math.floor(Math.random() * 2);
            isFirstEnemy = false;
            const el = document.createElement('div');
            el.className = 'unit'; el.style.backgroundImage = `url('${imgs[id]}')`;
            document.getElementById('game-container').appendChild(el);
            let hp = 150 * difficultyMult; let atk = 20 * difficultyMult;
            let size = (id === 1) ? 80 : 40;
            el.style.width = size + 'px'; el.style.height = size + 'px';
            let range = (id === 1) ? 60 : 15; let offset = (id === 0) ? -20 : 0;
            if (id === 1) hp *= 2.0; 
            enemyUnits.push({ el: el, x: 10, hp: hp, atk: atk, range: range, speed: 1.5, size: size, offset: offset });
            spawnInterval = setTimeout(enemySpawnLoop, (currentStage === 1) ? 4500 : 3000);
        }

        setInterval(() => {
            if (isGameOver) return;
            let containerWidth = document.getElementById('game-container').clientWidth;
            playerUnits.forEach(p => {
                let target = enemyUnits.find(e => {
                    let distance = (p.x + p.offset) - (e.x + e.offset);
                    return distance < Math.max((p.size/2 + e.size/2)*1.1, p.range, e.range) && distance > 0;
                });
                if (target) {
                    target.hp -= p.atk / 10;
                    if (Date.now() - lastAttackTime > 150) { safePlay(attackSe); lastAttackTime = Date.now(); }
                } else if (p.x > 50) { p.x -= p.speed; p.el.style.left = p.x + 'px'; }
                else { eCastleHP -= (p.atk / 50); }
            });

            enemyUnits.forEach(e => {
                let target = playerUnits.find(p => {
                    let distance = (p.x + p.offset) - (e.x + e.offset);
                    return distance < Math.max((e.size/2 + p.size/2)*1.1, e.range, p.range) && distance > 0;
                });
                if (target) { target.hp -= e.atk / 10; }
                else if (e.x < containerWidth - 100) { e.x += e.speed; e.el.style.left = e.x + 'px'; }
                else { pCastleHP -= (1 * difficultyMult); }
            });

            playerUnits = playerUnits.filter(p => p.hp > 0 || (p.el.remove(), false));
            enemyUnits = enemyUnits.filter(e => e.hp > 0 || (money = Math.min(maxMoney, money + 30*difficultyMult), e.el.remove(), false));

            if (eCastleHP <= 0) {
                if (currentStage === 1) { 
                    alert("STAGE 1 クリア！地獄の第二ステージスタート！"); 
                    resetStageData(2); enemySpawnLoop(); 
                }
                else { isGameOver = true; bgm.pause(); safePlay(winSe); setTimeout(() => { alert("全クリア！おめでとう！"); location.reload(); }, 300); }
            }
            if (pCastleHP <= 0) {
                isGameOver = true; bgm.pause(); safePlay(loseSe);
                document.getElementById('lose-menu').style.display = 'flex';
            }
        }, 50);
    </script>
</body>
</html>
