<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="robots" content="noindex,nofollow">
    <title>にゃんこ小戦争：レイアウト修正版</title>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        html, body { 
            position: fixed; width: 100%; height: 100%; 
            margin: 0; padding: 0; overflow: hidden; 
            background: #000; font-family: 'Arial Black', sans-serif;
        }

        /* 戦場：UIパネルを除いた残りの高さ(calc)を自動計算して、被りを防止 */
        #game-container {
            position: relative; 
            width: 100%; 
            height: calc(100% - 120px); /* 120pxは下のボタンエリアの高さ */
            margin: 0; 
            background: linear-gradient(to bottom, #87CEEB 80%, #90EE90 80%);
            overflow: hidden; 
            display: none;
        }
        .stage-2-active { background: linear-gradient(to bottom, #ff7e5f 80%, #feb47b 80%) !important; }

        /* 所持金表示を少しコンパクトに調整（被り対策） */
        .money-display {
            position: absolute; top: 5px; right: 10px;
            font-size: 35px; font-weight: bold; color: #ffeb3b;
            text-shadow: 3px 3px 0 #000;
            z-index: 100;
        }

        /* キャラクターと城：地面に密着させる */
        .unit { position: absolute; bottom: 0; background-size: contain; background-repeat: no-repeat; background-position: bottom center; z-index: 5; }
        .castle { position: absolute; width: 12.5%; height: 35%; z-index: 10; background-size: contain; background-repeat: no-repeat; background-position: bottom center; }
        #enemy-castle { left: 0; bottom: -15px; background-image: url('enemy_castle.png'); }
        #player-castle { right: 0; bottom: 0; background-image: url('my_castle.png'); }

        /* ------------------ UIパネル：最下部に固定 ------------------ */
        #ui-panel { 
            position: absolute; left: 0; bottom: 0; 
            width: 100%; height: 120px; /* 高さを固定 */
            background: #222; 
            border-top: 4px solid #444; 
            display: none; 
            z-index: 200; /* キャラより前面に */
        }
        
        .btn-panel-container {
            width: 100%; height: 100%;
            display: grid; grid-template-columns: 30% 70%;
            gap: 5px; padding: 8px;
        }

        /* 働き猫ボタン：さらに大きく */
        .lv-up-btn {
            width: 100%; height: 100%; background: #ffeb3b; border-radius: 12px; border: 4px solid #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold;
        }
        .lv-up-cost-txt { font-size: 18px; color: #d4a017; text-shadow: 1px 1px 0 #000; }

        /* 出撃ボタン */
        .spawn-btn-container { display: flex; gap: 8px; align-items: stretch; }
        .spawn-btn {
            flex: 1; background: #fff; border: 4px solid #000; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        .spawn-btn-cost { position: absolute; right: 5px; bottom: 5px; color: #d4a017; font-size: 18px; font-weight: bold; }
        
        button:disabled { background: #555 !important; opacity: 0.7; color: #888; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay">
        <div style="margin-bottom:20px; text-align:center;">
            <span style="font-size:30px; color:#fff; text-shadow:2px 2px 0 #000;">にゃんこ</span><br>
            <span style="font-size:60px; background:linear-gradient(to bottom, #ffeb3b 50%, #fbc02d 50%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; filter:drop-shadow(3px 3px 0 #000);">小戦争</span>
        </div>
        <button style="width:180px; padding:12px; font-size:20px; font-weight:bold; background:#fff; border-radius:10px;" onclick="startGame()">戦闘開始</button>
    </div>

    <div id="game-container">
        <div class="money-display"><span id="money-txt">0</span> / <span id="max-money-txt">500</span></div>
        <div id="enemy-castle" class="castle"></div>
        <div id="player-castle" class="castle"></div>
    </div>

    <div id="ui-panel">
        <div class="btn-panel-container">
            <button class="lv-up-btn" id="lv-up-btn" onclick="upgradeWorker()">
                <span>働き猫 Lv.<span id="worker-lv-txt">1</span></span>
                <span class="lv-up-cost-txt"><span id="lv-cost-txt">100</span>円</span>
            </button>
            <div class="spawn-btn-container">
                <button class="spawn-btn" id="btn-n1" onclick="spawn(0)">
                    <span style="font-size:22px; font-weight:bold;">ねこ</span>
                    <span class="spawn-btn-cost">20円</span>
                </button>
                <button class="spawn-btn" id="btn-n2" onclick="spawn(1)">
                    <span style="font-size:22px; font-weight:bold;">タンク</span>
                    <span class="spawn-btn-cost">50円</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 以前のスクリプト（Audio, 変数, spawn, enemySpawnLoop, 各種インターバルなど）はそのまま流用してください ---
        const loadAudio = (src) => new Audio(src);
        const bgm = loadAudio('bgm.m4a'); bgm.loop = true;
        const attackSe = loadAudio('attack.mp3');
        const winSe = loadAudio('victory.mp3');
        const loseSe = loadAudio('defeat.mp3');

        function safePlay(audioObj) { if (audioObj) audioObj.play().catch(e => {}); }

        let currentStage = 1, difficultyMult = 1.0, money = 0, workerLv = 1, maxMoney = 500;
        let workerUpgradeCost = 100, playerUnits = [], enemyUnits = [], pCastleHP = 1000, eCastleHP = 1000;
        let isGameOver = true, lastAttackTime = 0, isFirstEnemy = true, spawnInterval;

        function startGame() {
            isGameOver = false;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('ui-panel').style.display = 'block';
            safePlay(bgm);
            resetStageData(1);
            enemySpawnLoop();
        }

        function resetStageData(stage) {
            currentStage = stage;
            difficultyMult = (stage === 1) ? 1.0 : 1.5;
            pCastleHP = 1000; eCastleHP = (stage === 1) ? 1000 : 2000;
            money = 0; workerLv = 1; maxMoney = 500; workerUpgradeCost = 100;
            isFirstEnemy = true;
            playerUnits.forEach(u => u.el.remove()); enemyUnits.forEach(u => u.el.remove());
            playerUnits = []; enemyUnits = [];
            if(stage === 2) document.getElementById('game-container').classList.add('stage-2-active');
            clearTimeout(spawnInterval);
        }

        setInterval(() => {
            if (isGameOver) return;
            if (money < maxMoney) money += (0.15 + (workerLv * 0.15));
            document.getElementById('money-txt').innerText = Math.floor(money);
            document.getElementById('max-money-txt').innerText = maxMoney;
            document.getElementById('worker-lv-txt').innerText = workerLv;
            document.getElementById('lv-cost-txt').innerText = workerUpgradeCost;
            document.getElementById('btn-n1').disabled = (money < 20);
            document.getElementById('btn-n2').disabled = (money < 50);
            document.getElementById('lv-up-btn').disabled = (money < workerUpgradeCost);
        }, 100);

        function upgradeWorker() {
            if (money >= workerUpgradeCost) {
                money -= workerUpgradeCost; workerLv++; maxMoney += 500;
                workerUpgradeCost = Math.floor(workerUpgradeCost * 1.6);
            }
        }

        function spawn(id) {
            if (isGameOver) return;
            const imgs = ['neko.png', 'tank.png'];
            if (money >= (id === 0 ? 20 : 50)) {
                money -= (id === 0 ? 20 : 50);
                const el = document.createElement('div');
                el.className = 'unit'; el.style.backgroundImage = `url('${imgs[id]}')`;
                document.getElementById('game-container').appendChild(el);
                let size = (id === 1) ? 100 : 70; 
                el.style.width = size + 'px'; el.style.height = size + 'px';
                let startX = document.getElementById('game-container').clientWidth - 100;
                playerUnits.push({ el: el, x: startX, hp: (id===1?1500:150), atk: (id===0?23:5), range: (id===1?5:60), speed: (id===0?3.75:1.8), size: size, offset: (id===1?30:0) });
            }
        }

        function enemySpawnLoop() {
            if (isGameOver) return;
            const imgs = ['dog.png', 'seal.png'];
            let id = isFirstEnemy ? 0 : Math.floor(Math.random() * 2);
            isFirstEnemy = false;
            const el = document.createElement('div');
            el.className = 'unit'; el.style.backgroundImage = `url('${imgs[id]}')`;
            document.getElementById('game-container').appendChild(el);
            let size = (id === 1) ? 140 : 70;
            el.style.width = size + 'px'; el.style.height = size + 'px';
            if (id === 1) el.style.bottom = "-5px";
            enemyUnits.push({ el: el, x: 20, hp: (id===1?300:150)*difficultyMult, atk: (id===0?40:65)*difficultyMult, range: (id===1?90:20), speed: 1.8, size: size, offset: (id===0?-30:0) });
            spawnInterval = setTimeout(enemySpawnLoop, (currentStage === 1) ? 4500 : 3000);
        }

        setInterval(() => {
            if (isGameOver) return;
            let cw = document.getElementById('game-container').clientWidth;
            playerUnits.forEach(p => {
                let target = enemyUnits.find(e => {
                    let d = (p.x + p.offset) - (e.x + e.offset);
                    return d < Math.max((p.size/2 + e.size/2)*1.1, p.range) && d > 0;
                });
                if (target) { target.hp -= p.atk / 10; safePlay(attackSe); }
                else if (p.x > 80) { p.x -= p.speed; p.el.style.left = p.x + 'px'; }
                else { eCastleHP -= p.atk / 50; }
            });

            enemyUnits.forEach(e => {
                let target = playerUnits.find(p => {
                    let d = (p.x + p.offset) - (e.x + e.offset);
                    return d < Math.max((e.size/2 + p.size/2)*1.1, e.range) && d > 0;
                });
                if (target) { target.hp -= e.atk / 10; }
                else if (e.x < cw - 140) { e.x += e.speed; e.el.style.left = e.x + 'px'; }
                else { pCastleHP -= 1 * difficultyMult; }
            });

            playerUnits = playerUnits.filter(p => p.hp > 0 || (p.el.remove(), false));
            enemyUnits = enemyUnits.filter(e => e.hp > 0 || (money = Math.min(maxMoney, money + 30*difficultyMult), e.el.remove(), false));

            if (eCastleHP <= 0) {
                if (currentStage === 1) { alert("STAGE 1 クリア！"); resetStageData(2); enemySpawnLoop(); }
                else { isGameOver = true; bgm.pause(); safePlay(winSe); alert("全クリア！"); location.reload(); }
            }
            if (pCastleHP <= 0) { isGameOver = true; bgm.pause(); safePlay(loseSe); location.reload(); }
        }, 50);
    </script>
</body>
</html>
