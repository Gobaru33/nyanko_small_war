<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>にゃんこ小戦争：マルチデバイス版</title>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html, body { position: fixed; width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }

        /* 戦場：UIを除いたエリア */
        #game-container {
            position: relative; width: 100%; height: calc(100% - 120px);
            background: linear-gradient(to bottom, #87CEEB 80%, #90EE90 80%);
            overflow: hidden; display: none;
        }

        /* 所持金：スマホでも邪魔にならないサイズ感 */
        .money-display {
            position: absolute; top: 10px; right: 15px;
            font-size: 8vw; max-font-size: 40px; font-weight: bold; color: #ffeb3b;
            text-shadow: 2px 2px 0 #000; z-index: 100;
        }

        /* お城：横幅基準(vw)でサイズを統一 */
        .castle { 
            position: absolute; bottom: 0; width: 25vw; height: 40vw; max-width: 150px; max-height: 250px;
            z-index: 10; background-size: contain; background-repeat: no-repeat; background-position: bottom center; 
        }
        #enemy-castle { left: 0; bottom: -15px; background-image: url('enemy_castle.png'); }
        #player-castle { right: 0; bottom: 0; background-image: url('my_castle.png'); }
        
        /* 城の上の数字：サイズを調整 */
        .castle-hp-text { 
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%); 
            min-width: 60px; color: #fff; font-size: 3vw; background: rgba(0,0,0,0.6); 
            border-radius: 5px; text-align: center; padding: 2px;
        }

        /* キャラクター：生成時にJSでvw指定 */
        .unit { position: absolute; bottom: 0; background-size: contain; background-repeat: no-repeat; background-position: bottom center; z-index: 5; }

        /* UIパネル */
        #ui-panel { position: absolute; left: 0; bottom: 0; width: 100%; height: 120px; background: #222; border-top: 4px solid #444; display: none; z-index: 200; }
        .btn-panel-container { width: 100%; height: 100%; display: grid; grid-template-columns: 30% 70%; gap: 5px; padding: 10px; }
        .lv-up-btn { width: 100%; background: #ffeb3b; border-radius: 12px; border: 3px solid #fff; font-weight: bold; }
        .spawn-btn-container { display: flex; gap: 8px; }
        .spawn-btn { flex: 1; background: #fff; border: 3px solid #000; border-radius: 10px; font-weight: bold; position: relative; }
        .spawn-btn-cost { position: absolute; right: 5px; bottom: 5px; color: #d4a017; font-size: 14px; }
        button:disabled { opacity: 0.5; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay">
        <h1>にゃんこ小戦争</h1>
        <button style="padding:15px 40px; font-size:20px; border-radius:10px;" onclick="startGame()">戦闘開始</button>
    </div>

    <div id="game-container">
        <div class="money-display"><span id="money-txt">0</span> / <span id="max-money-txt">500</span></div>
        <div id="enemy-castle" class="castle"><div class="castle-hp-text"><span id="e-hp-txt">1000</span></div></div>
        <div id="player-castle" class="castle"><div class="castle-hp-text"><span id="p-hp-txt">1000</span></div></div>
    </div>

    <div id="ui-panel">
        <div class="btn-panel-container">
            <button class="lv-up-btn" onclick="upgradeWorker()">Lv.<span id="worker-lv-txt">1</span><br><span id="lv-cost-txt">100</span>円</button>
            <div class="spawn-btn-container">
                <button class="spawn-btn" id="btn-n1" onclick="spawn(0)">ねこ<span class="spawn-btn-cost">20円</span></button>
                <button class="spawn-btn" id="btn-n2" onclick="spawn(1)">タンク<span class="spawn-btn-cost">50円</span></button>
            </div>
        </div>
    </div>

    <script>
        // 基本設定
        let money = 0, workerLv = 1, maxMoney = 500, workerUpgradeCost = 100;
        let playerUnits = [], enemyUnits = [], pCastleHP = 1000, eCastleHP = 1000;
        let isGameOver = true, currentStage = 1, difficultyMult = 1.0;

        function startGame() {
            isGameOver = false;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('ui-panel').style.display = 'block';
            resetStage(1);
            enemyLoop();
        }

        function resetStage(s) {
            currentStage = s;
            difficultyMult = (s === 1) ? 1.0 : 1.5;
            eCastleHP = (s === 1) ? 1000 : 2000;
            playerUnits.forEach(u => u.el.remove()); enemyUnits.forEach(u => u.el.remove());
            playerUnits = []; enemyUnits = [];
        }

        // 味方出撃（サイズをvwで指定）
        function spawn(id) {
            const cost = [20, 50][id];
            if (money < cost) return;
            money -= cost;
            const el = document.createElement('div');
            el.className = 'unit';
            el.style.backgroundImage = `url('${['neko.png', 'tank.png'][id]}')`;
            // ★サイズを画面横幅(vw)基準にする
            let sizeVw = (id === 1) ? 22 : 16; 
            el.style.width = sizeVw + 'vw';
            el.style.height = sizeVw + 'vw';
            document.getElementById('game-container').appendChild(el);
            
            let startX = document.getElementById('game-container').clientWidth - (window.innerWidth * sizeVw / 100);
            playerUnits.push({ el, x: startX, hp: [150, 1500][id], atk: [23, 5][id], speed: [3.7, 1.8][id], size: sizeVw });
        }

        // 敵出撃
        function enemyLoop() {
            if (isGameOver) return;
            const id = Math.random() > 0.7 ? 1 : 0; // アザラシの確率
            const el = document.createElement('div');
            el.className = 'unit';
            el.style.backgroundImage = `url('${['dog.png', 'seal.png'][id]}')`;
            
            let sizeVw = (id === 1) ? 30 : 16; 
            el.style.width = sizeVw + 'vw';
            el.style.height = sizeVw + 'vw';
            // ★アザラシをさらに下げる
            if (id === 1) el.style.bottom = "-5px";
            
            document.getElementById('game-container').appendChild(el);
            enemyUnits.push({ el, x: 0, hp: [150, 300][id]*difficultyMult, atk: [40, 65][id]*difficultyMult, speed: 1.5, size: sizeVw });
            setTimeout(enemyLoop, 4000 / difficultyMult);
        }

        // メインループ
        setInterval(() => {
            if (isGameOver) return;
            // お金
            if (money < maxMoney) money += (0.2 + workerLv * 0.1);
            document.getElementById('money-txt').innerText = Math.floor(money);
            document.getElementById('max-money-txt').innerText = maxMoney;
            document.getElementById('e-hp-txt').innerText = Math.floor(eCastleHP);
            document.getElementById('p-hp-txt').innerText = Math.floor(pCastleHP);

            const cw = document.getElementById('game-container').clientWidth;

            // 味方移動・攻撃
            playerUnits.forEach(p => {
                let collision = enemyUnits.find(e => Math.abs(p.x - e.x) < 50);
                if (collision) collision.hp -= p.atk/10;
                else if (p.x > 50) { p.x -= p.speed; p.el.style.left = p.x + 'px'; }
                else { eCastleHP -= p.atk/100; }
            });

            // 敵移動・攻撃
            enemyUnits.forEach(e => {
                let collision = playerUnits.find(p => Math.abs(e.x - p.x) < 50);
                if (collision) collision.hp -= e.atk/10;
                else if (e.x < cw - 100) { e.x += e.speed; e.el.style.left = e.x + 'px'; }
                else { pCastleHP -= e.atk/100; }
            });

            playerUnits = playerUnits.filter(u => u.hp > 0 || (u.el.remove(), false));
            enemyUnits = enemyUnits.filter(u => u.hp > 0 || (u.el.remove(), false));

            if (eCastleHP <= 0 || pCastleHP <= 0) { alert("終了！"); location.reload(); }
        }, 50);

        function upgradeWorker() {
            if (money >= workerUpgradeCost) { money -= workerUpgradeCost; workerLv++; maxMoney += 500; workerUpgradeCost *= 1.5; }
        }
    </script>
</body>
</html>
